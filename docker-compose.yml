services:
  raview-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        VITE_EUR_TO_RON: ${VITE_EUR_TO_RON:-5}
    image: raview-e-commerce-frontend:latest
    container_name: ravio_frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - ravio-net

networks:
  ravio-net:
    external: true
